spring.application.name=tienda

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/techshop

spring.datasource.username=root
spring.datasource.password=root

#Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 
#mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

firebase.bucket.name=techshop-c02af.firebasestorage.app
firebase.storage.path=techshop
firebase.json.path=firebase
firebase.json.file=techshop-c02af-firebase-adminsdk-fbsvc-6a4208a6af.json

logging.pattern.dateformat=hh:mm

spring.main.banner-mode=off

spring.thymeleaf.cache=false

#Conexión para Aiven
spring.datasource.url=jdbc:mysql://techshop-techshop-b.d.aivencloud.com:16080/defaultdb?sslMode=REQUIRED
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver